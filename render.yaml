# Render.com blueprint: FREE tier that runs the full server (comments + AI assistant),
# unlike static hosts. "New → Blueprint" and point it at your fork.
# Notes: the free instance sleeps after idle (first visit wakes it in ~30s), and its
# disk is ephemeral — comments in data/comments.json reset on each deploy.
services:
  - type: web
    name: lecture-deck
    runtime: node
    plan: free
    buildCommand: node build.js
    startCommand: node server.js
    envVars:
      - key: ANTHROPIC_API_KEY   # optional — enables the code-lab AI assistant
        sync: false
